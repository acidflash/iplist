networks:
  iplist-net:

services:
  backend:
    build: ./backend
    restart: unless-stopped
    networks:
      - iplist-net
    cap_add:
      - NET_RAW
    environment:
      DB_PATH: ${DB_PATH:-/data/iplist.db}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — generate one with: openssl rand -hex 32}
      PORT: "3000"
    volumes:
      - ./data:/data

  frontend:
    build:
      context: ./frontend
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    restart: unless-stopped
    networks:
      - iplist-net
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - backend
