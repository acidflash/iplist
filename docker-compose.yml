services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_PATH: /data/iplist.db
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
    volumes:
      - sqlite_data:/data

  frontend:
    build: ./frontend
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
