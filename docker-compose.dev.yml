services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: iplist-backend-dev
    ports:
      - "8080:8080"
    environment:
      DB_PATH: /data/iplist.db
    volumes:
      - ./backend:/app
      - sqlite_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: iplist-frontend-dev
    ports:
      - "5173:5173"
    environment:
      API_TARGET: http://backend:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
